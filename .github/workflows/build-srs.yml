name: Build SRS Ruleset

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install sing-box
        run: |
          DOWNLOAD_URL=$(curl -s https://api.github.com/repos/SagerNet/sing-box/releases/latest | grep -o '"browser_download_url": "https://[^"]*linux-amd64\.tar\.gz"' | cut -d'"' -f4)
          wget -q "$DOWNLOAD_URL" -O sing-box.tar.gz
          tar xzf sing-box.tar.gz
          sudo mv sing-box /usr/local/bin/

      - name: Build SRS files
        run: python3 build_srs.py

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: Release ${{ github.run_number }}
          files: SRS/*.srs
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: srs-files
          path: SRS/
          retention-days: 7
